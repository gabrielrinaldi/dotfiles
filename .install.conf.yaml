- clean: ['~']

- shell:
    - [git submodule update, Updating dotbot]
    - [git submodule update --init --recursive, Installing submodules]
    - ["curl -fsSL https://raw.github.com/supermarin/Alcatraz/master/Scripts/install.sh | sh", Installing Alcatraz]

- link:
    ~/.htoprc:
        force: true
        relink: true
        path: htoprc
    ~/.tmux.conf:
        force: true
        relink: true
        path: tmux.conf
    ~/.gitconfig:
        force: true
        relink: true
        path: gitconfig
    ~/.gitignore:
        force: true
        relink: true
        path: gitignore
    ~/.zshrc:
        force: true
        relink: true
        path: zshrc
    ~/.oh-my-zsh/custom/themes/powerlevel9k:
        create: true
        force: true
        relink: true
        path: oh-my-zsh/themes/powerlevel9k
    ~/.oh-my-zsh/custom/plugins/aliases/aliases.plugin.zsh:
        create: true
        force: true
        relink: true
        path: oh-my-zsh/plugins/aliases/aliases.plugin.zsh
    ~/.oh-my-zsh/custom/plugins/dirs/dirs.plugin.zsh:
        create: true
        force: true
        relink: true
        path: oh-my-zsh/plugins/dirs/dirs.plugin.zsh
