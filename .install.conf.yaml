- clean: ['~']

- brew:
    - ack
    - docker
    - git-lfs
    - openssl
    - postgresql
    - reattach-to-user-namespace
    - tmux
    - docker-compose
    - heroku
    - mysql
    - rbenv
    - redis
    - base64
    - ctags
    - git
    - nvm
    - ruby-build
    - vim
    - zsh

- cask: [alfred, appdelete, bartender, dropbox, google-chrome, google-cloud-sdk, iterm2, microsoft-office, ngrok, omnifocus, paw, sketch, skype, spotify, steam, sublime-text, tower]

- shell:
    - [git submodule update, Updating dotbot]
    - [git submodule update --init --recursive, Installing submodules]

- link:
    ~/.htoprc:
        force: true
        relink: true
        path: htoprc
    ~/.vim:
        force: true
        relink: true
        path: .janus
    ~/.npmrc:
        force: true
        relink: true
        path: npmrc
    ~/.gitconfig:
        force: true
        relink: true
        path: gitconfig
    ~/.gitignore:
        force: true
        relink: true
        path: gitignore
    ~/.tmux.conf:
        force: true
        relink: true
        path: tmux.conf
    ~/.zshrc:
        force: true
        relink: true
        path: zshrc
    ~/.oh-my-zsh/custom/themes/powerlevel9k:
        create: true
        force: true
        relink: true
        path: oh-my-zsh/themes/powerlevel9k
    ~/.oh-my-zsh/custom/plugins/aliases/aliases.plugin.zsh:
        create: true
        force: true
        relink: true
        path: oh-my-zsh/plugins/aliases/aliases.plugin.zsh
    ~/.oh-my-zsh/custom/plugins/dirs/dirs.plugin.zsh:
        create: true
        force: true
        relink: true
        path: oh-my-zsh/plugins/dirs/dirs.plugin.zsh
