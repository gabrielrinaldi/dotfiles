- clean: ['~']

- shell:
    - [git submodule update, Updating dotbot]
    - [git submodule update --init --recursive, Installing submodules]
    - [curl -L git.io/antigen > $HOME/.dotfiles/antigen.zsh]

- link:
    ~/.asdfrc:
        force: true
        relink: true
        path: asdfrc
    ~/.brewfile:
        force: true
        relink: true
        path: brewfile
    ~/.default-gems:
        force: true
        relink: true
        path: default-gems
    ~/.gemrc:
        force: true
        relink: true
        path: gemrc
    ~/.gitconfig:
        force: true
        relink: true
        path: gitconfig
    ~/.gitignore:
        force: true
        relink: true
        path: gitignore
    ~/.htoprc:
        force: true
        relink: true
        path: htoprc
    ~/.irbrc:
        force: true
        relink: true
        path: irbrc
    ~/.npmrc:
        force: true
        relink: true
        path: npmrc
    ~/.warp:
        force: true
        relink: true
        path: warp
    ~/.zshrc:
        force: true
        relink: true
        path: zshrc
